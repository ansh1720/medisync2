<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediSync - Redirecting...</title>
  <script>
    // Extract the requested path (everything after the base path /medisync2/)
    // and store it to restore it after the SPA loads
    const fullPath = window.location.pathname + window.location.search + window.location.hash;
    // Remove the /medisync2/ prefix to get just the route
    const route = fullPath.replace('/medisync2', '') || '/';
    // Redirect to index.html with the route as a query parameter
    window.location.replace('/medisync2/?redirect=' + encodeURIComponent(route));
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
